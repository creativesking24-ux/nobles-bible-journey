<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Prevent theme flash before React hydrates
      (function () {
        try {
          var t = localStorage.getItem('nobles-theme')
          if (!t) {
            var raw = localStorage.getItem('nobles-bible-journey-v1')
            if (raw) {
              var s = JSON.parse(raw)
              if (s && s.state && s.state.settings && s.state.settings.darkMode === false) t = 'light'
            }
          }
          if (t === 'light') {
            document.documentElement.classList.remove('dark')
            document.documentElement.classList.add('light')
          } else {
            document.documentElement.classList.add('dark')
            document.documentElement.classList.remove('light')
          }
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0D1B2A" />
    <meta
      name="description"
      content="Noble's Bible Journey Tracker — 90+ Day Bible Study (Epistles, Proverbs & Revelation)"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bible Journey" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Noble's Bible Journey</title>
  </head>
  <body class="bg-navy text-parchment antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
